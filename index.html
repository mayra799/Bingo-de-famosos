<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo de Famosos</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎬 Bingo de Famosos 🎤</h1>
            <p>Marque as celebridades e complete as linhas!</p>
        </header>

        <div class="controls">
            <button id="newCardBtn" class="btn btn-primary">Novo Cartão</button>
            <button id="resetBtn" class="btn btn-secondary">Resetar Marcações</button>
        </div>

        <div id="bingoCard" class="bingo-card">
            <!-- Cartão será gerado pelo JavaScript -->
        </div>

        <div class="info">
            <p id="messageText">Clique nas celebridades para marcar!</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
