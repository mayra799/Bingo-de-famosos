<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BINGO DA NOVE</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <img src="IMG_20260701_225106.jpg" alt="Nove Games" class="topo-imagem"> 
        <h1>BINGO DA NOVE</h1>
        
        <div class="bingo-table">
            <div class="header">
                <div class="col-letter">B</div>
                <div class="col-letter">I</div>
                <div class="col-letter">N</div>
                <div class="col-letter">G</div>
                <div class="col-letter">O</div>
            </div>
            
            <div id="bingoGrid" class="grid">
                </div>
        </div>
        
        <div class="controls">
            <button id="newCardBtn">Novo Cartão</button>
            <button id="resetBtn">Limpar</button>
            <button id="bingoBtn" style="background-color: #e74c3c; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold;">🎉 Gritar BINGO! 🎉</button>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
    <script src="script.js"></script>
</body>
</html>
